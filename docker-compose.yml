version: '3.8'

services:
  # ========== MySQL ==========
  mysql:
    image: mysql:8.0
    container_name: eduraag-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: eduraag123
      MYSQL_DATABASE: eduraag
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    container_name: eduraag-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ========== Milvus (Standalone) ==========
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: eduraag-etcd
    restart: always
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: eduraag-minio
    restart: always
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: eduraag-milvus
    restart: always
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    command: milvus run standalone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      retries: 5

  # ========== EduRAG App ==========
  app:
    build: .
    container_name: eduraag-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # 挂载模型文件（太大不进镜像）
      - ./rag_qa/model:/app/rag_qa/model
      - ./rag_qa/core/bert_query_classifier:/app/rag_qa/core/bert_query_classifier
      # 挂载数据目录
      - ./rag_qa/data:/app/rag_qa/data
      # 配置文件
      - ./config.ini:/app/config.ini
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  mysql_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
